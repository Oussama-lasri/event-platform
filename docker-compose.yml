version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: event-platform-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: event-platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - event-platform-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-platform-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/event-platform?authSource=admin
      JWT_SECRET: super_secret_key_docker
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - event-platform-network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: event-platform-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - event-platform-network

volumes:
  mongodb_data:

networks:
  event-platform-network:
    driver: bridge